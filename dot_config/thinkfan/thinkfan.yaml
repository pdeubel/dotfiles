sensors:
  # Could be that the paths need to be adjusted, then: use /sys/class/hwmon and hwmon-name
  # That will be the case if the hwmon6, hwmon7, etc. are not the same after boot

  # TODO fix note
  # CPU Package and Core Temperatures
  - hwmon: /sys/class/hwmon
    name: coretemp
    indices: [1, 2, 6, 10, 14, 18, 19, 20, 21, 22, 23, 24, 25]
    # indices: [1, 2, 3, 4, 5]
    max_errors: 10

  # GPU
  # - nvml: 03:00.0

  # CPU through thinkpad_hwmon, possibly chassis temperatures
  - hwmon: /sys/class/hwmon
    name: thinkpad
    indices: [1, 3, 5, 6, 7]
    max_errors: 10

  # NVME
  - hwmon: /sys/class/hwmon
    name: nvme
    indices: [1, 2]
    max_errors: 10

  # acpitz, probably MB
  # - hwmon: /sys/class/hwmon
  #   name: acpitz
  #   indices: [1]

fans:
  - tpacpi: /proc/acpi/ibm/fan
    max_errors: 10

levels:
  - [0, 0, 55]
  - [1, 53, 60]
  - [2, 58, 65]
  - [3, 63, 70]
  - [4, 68, 75]
  - [5, 73, 80]
  - [6, 78, 85]
  - [7, 83, 255]
